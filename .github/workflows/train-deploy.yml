name: Train & Deploy
on:
  push:
    branches: [main]
    paths: ["src/**", "dvc.yaml", "configs/**"]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup DVC
        run: pip install dvc
      - name: Pull data
        run: dvc pull
        env:
          DVC_ENDPOINT: ${{ secrets.AWS_ENDPOINT_URL }}
      - name: Run pipeline
        run: dvc repro
      - name: Register model
        run: python src/models/register.py
